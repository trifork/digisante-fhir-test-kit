name: CI

on:
  push:
    branches: ["**"]
    tags:
      - "v*"
      - "[0-9]*"
  pull_request:

env:
  # HAPI FHIR base version baked into the published image.
  HAPI_VERSION: v8.4.0-3
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Build + integration tests (CH EMR IG)
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    env:
      # Use Docker Compose on the runner: it provides service-name DNS and honours
      # depends_on healthchecks (the runner's podman-compose/podman 3.4.4 does
      # neither, so the server cannot reach the "db" host). Docker is preinstalled.
      COMPOSE: docker compose
    steps:
      - uses: actions/checkout@v4

      - name: Provision stack (loads the CH EMR IG)
        run: ./tests/provision.sh

      - name: Run tests
        run: ./tests/run-tests.sh

      - name: Dump container logs on failure
        if: failure()
        run: |
          docker ps -a || true
          for c in $(docker ps -a --format '{{.Names}}' | grep -iE 'fhir|db'); do
            echo "::group::logs $c"
            docker logs --tail 300 "$c" 2>&1 || true
            echo "::endgroup::"
          done

  publish:
    name: Publish image
    needs: test
    # Publish only for branch/tag pushes (not PRs): `latest` from main, a
    # version-tagged image from git tags.
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=tag
            type=raw,value=hapi-${{ env.HAPI_VERSION }}
            type=sha

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push FHIR server image
        uses: docker/build-push-action@v6
        with:
          context: ./fhir-server
          build-args: |
            HAPI_VERSION=${{ env.HAPI_VERSION }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
